<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亚马逊体育 - 2026世界杯推荐平台</title>
    <style>
        /* 奢华极光星空重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 华丽极光深邃夜空背景 */
            background: #04060f radial-gradient(circle at 50% 0%, #1a2542 0%, #0a0f1d 50%, #03050a 100%);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景流光炫彩晕染层 */
        body::before {
            content: '';
            position: absolute;
            top: -10%; left: -20%; width: 140%; height: 60%;
            background: radial-gradient(circle at 40% 30%, rgba(0, 163, 255, 0.15) 0%, rgba(255, 119, 0, 0.08) 45%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            position: relative;
            padding: 24px 16px 140px 16px;
            z-index: 1;
        }

        /* 顶部跑马灯 */
        .marquee-box {
            background: rgba(6, 9, 22, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 12px;
            color: #ffd700;
            margin-bottom: 24px;
            overflow: hidden;
            white-space: nowrap;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: k-marquee 20s linear infinite;
        }
        
        @keyframes k-marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* 殿堂级半透明悬浮主卡片 */
        .main-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.65);
            margin-bottom: 30px;
        }

        /* 完美适配你专属 logo.png 的外圈框 */
        .platform-logo {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 30px rgba(0, 163, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #111625;
        }

        .platform-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .platform-title {
            font-size: 30px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: 1.5px;
        }

        .platform-tagline {
            font-size: 13px;
            color: #00ffcc;
            margin-bottom: 28px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        
        .feature-tag {
            background: rgba(255, 255, 255, 0.06);
            padding: 7px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 纯代码精美特惠板块 */
        .promo-banner-card {
            background: linear-gradient(135deg, rgba(0, 163, 255, 0.15) 0%, rgba(255, 119, 0, 0.1) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 24px 16px;
            margin-bottom: 28px;
        }
        .promo-title {
            font-size: 17px;
            color: #ffd700;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .promo-text {
            font-size: 13px;
            color: #e5e7eb;
            line-height: 1.7;
        }
        .promo-highlight {
            color: #00ffcc;
            font-weight: 800;
        }

        /* 3D黄金流光大按钮 */
        .cta-button {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ffea4a 0%, #ff9e00 50%, #ff6200 100%);
            color: #03050a;
            text-decoration: none;
            font-size: 19px;
            font-weight: 900;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(255, 119, 0, 0.45);
            position: relative;
            overflow: hidden;
        }
        
        .cta-button::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%; width: 35%; height: 200%;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(25deg);
            animation: k-shine 3s infinite linear;
        }
        
        @keyframes k-shine {
            0% { left: -30%; }
            25% { left: 110%; }
            100% { left: 110%; }
        }

        /* 吸底单独大按钮样式（只保留QQ群） */
        .contact-section {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 448px;
            background: rgba(13, 20, 38, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 10px;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
            z-index: 9999;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 153, 255, 0.2);
            border: 1px solid rgba(0, 153, 255, 0.4);
            padding: 14px;
            border-radius: 40px;
            text-decoration: none;
            color: #ffffff;
            gap: 12px;
            width: 100%;
        }

        /* 纯静态QQ图标，100%不裂图 */
        .contact-svg-icon {
            width: 26px;
            height: 26px;
        }
        
        .contact-name {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #33b5ff;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div class="marquee-box">
            <div class="marquee-content">
                🔥 贵宾特邀提示：亚马逊体育官方直营平台，支持大额无忧、存取款秒到账！若遭遇网络访问限制，请点击下方加入官方交流群。
            </div>
        </div>

        <div class="main-card">
            
            <div class="platform-logo">

            <h1 class="platform-title">亚马逊体育</h1>
            <p class="platform-tagline">✦ 2026世界杯官方指定合作伙伴 ✦</p>
            
            <div class="features">
                <span class="feature-tag">💎 行业独家</span>

            </div>

            <a href="#" target="_blank" class="cta-button">

        </div>

        <div class="contact-section">
            <a href="https://qm.qq.com/q/qcdGTSyAgw" target="_blank" class="contact-item">

                    <circle cx="50" cy="50" r="45" fill="#0099ff"/>
                    <path fill="#ffffff" d="M50,20 C32,20 25,35 25,52 C25,65 31,73 37,77 L34,85 C34,86 36,87 37,86 L45,80 C47,80 48,80 50,80 Z" />
                </svg>
                <span class="contact-name">点击加入 · VIP官方QQ群</span>
            </a>
        </div>

    </div>

</body>
</html>
